  /api/v2/:
    get:
      description: Lists all available entity sets in the v2 API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/tutorial_go_Handler_V2.ServiceDocumentResponse'
      summary: OData v4 service document
      tags:
      - odata
  /api/v2/$metadata:
    get:
      description: Returns the EDMX metadata document describing all entity types
        and their properties
      produces:
      - text/xml
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: OData v4 metadata document
      tags:
      - odata
  /api/v2/products:
    get:
      description: Returns a paginated product collection using OData v4 query options
      parameters:
      - description: 'Number of records to return (default: 10)'
        in: query
        name: $top
        type: integer
      - description: 'Number of records to skip (default: 0)'
        in: query
        name: $skip
        type: integer
      - description: Sort field and direction (e.g. name asc, price desc)
        in: query
        name: $orderby
        type: string
      - description: OData filter (e.g. name eq 'Laptop' and price gt 10000, contains(name,'lap'),
          startswith(name,'L'))
        in: query
        name: $filter
        type: string
      - description: Search term matched against product name
        in: query
        name: $search
