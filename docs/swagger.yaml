host: localhost:3020
info:
  contact: {}
  description: REST API with Gin, GORM, and Swagger — v1 uses custom query params,
    v2 uses OData
  title: Go API V6
  version: "2.0"
paths:
  /api/v1/products:
    get:
      description: Returns a paginated list of products with optional sorting, filtering,
        and search
      parameters:
      - description: 'Number of records to return (default: 10)'
        in: query
        name: top
        type: integer
      - description: 'Number of records to skip (default: 0)'
        in: query
        name: skip
        type: integer
      - description: Field name to sort by (e.g. name, price)
        in: query
        name: sortby
        type: string
      - description: 'Sort direction: asc or desc (default: asc)'
        in: query
        name: order
        type: string
      - description: Search term matched against product name
        in: query
        name: search
        type: string
      - description: Filter by field value (e.g. filter[name]=Laptop)
        in: query
        name: filter
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Repository.PaginationResult-Models_Product'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tutorial_go_Handler_V1.ErrorResponse'
      summary: Get all products
      tags:
      - products
    post:
      consumes:
      - application/json
      description: Creates a new product with name and price
      parameters:
      - description: Product data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/tutorial_go_Handler_V1.CreateProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/Models.Product'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tutorial_go_Handler_V1.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tutorial_go_Handler_V1.ErrorResponse'
      summary: Create a product
      tags:
      - products
  /api/v1/products/{id}:
    delete:
      description: Deletes a product by ID (soft delete via GORM)
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/tutorial_go_Handler_V1.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tutorial_go_Handler_V1.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tutorial_go_Handler_V1.ErrorResponse'
      summary: Delete a product
      tags:
      - products
    get:
      description: Returns a single product by ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Models.Product'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tutorial_go_Handler_V1.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/tutorial_go_Handler_V1.ErrorResponse'
      summary: Get product by ID
      tags:
      - products
    put:
      consumes:
      - application/json
      description: Updates a product by ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated product data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/tutorial_go_Handler_V1.UpdateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Models.Product'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tutorial_go_Handler_V1.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tutorial_go_Handler_V1.ErrorResponse'
      summary: Update a product
      tags:
      - products
  /api/v1/users:
    get:
      description: Returns a paginated list of users with optional sorting, filtering,
        and search
      parameters:
      - description: 'Number of records to return (default: 10)'
        in: query
        name: top
        type: integer
      - description: 'Number of records to skip (default: 0)'
        in: query
        name: skip
        type: integer
      - description: Field name to sort by (e.g. name, email)
        in: query
        name: sortby
        type: string
      - description: 'Sort direction: asc or desc (default: asc)'
        in: query
        name: order
        type: string
      - description: Search term matched against name and email
        in: query
        name: search
        type: string
      - description: Filter by field value (e.g. filter[name]=Herris)
        in: query
        name: filter
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
