basePath: /
definitions:
  Models.Product:
    properties:
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        type: integer
      name:
        type: string
      price:
        type: number
      updatedAt:
        type: string
    type: object
  Models.User:
    properties:
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      updatedAt:
        type: string
    type: object
  Repository.PaginationResult-Models_Product:
    properties:
      Data:
        items:
          $ref: '#/definitions/Models.Product'
        type: array
      Skip:
        type: integer
      Top:
        type: integer
      Total:
        type: integer
      TotalPages:
        type: integer
    type: object
  Repository.PaginationResult-Models_User:
    properties:
      Data:
        items:
          $ref: '#/definitions/Models.User'
        type: array
      Skip:
        type: integer
      Top:
        type: integer
      Total:
        type: integer
      TotalPages:
        type: integer
    type: object
  V1.CreateProductRequest:
    properties:
      Name:
        example: Laptop
        type: string
      Price:
        example: 15000000
        type: number
    required:
    - Name
    - Price
    type: object
  V1.CreateUserRequest:
    properties:
      Email:
        example: herris@example.com
        type: string
      Name:
        example: Herris
        type: string
    required:
    - Email
    - Name
    type: object
  V1.ErrorResponse:
    properties:
      Error:
        example: error message
        type: string
    type: object
  V1.MessageResponse:
    properties:
      Message:
        example: operation successful
        type: string
    type: object
  V1.UpdateProductRequest:
    properties:
      Name:
        example: Laptop Pro
        type: string
      Price:
        example: 18000000
        type: number
    type: object
  V1.UpdateUserRequest:
    properties:
      Email:
        example: herris.new@example.com
        type: string
      Name:
        example: Herris Updated
        type: string
    type: object
  V2.ErrorResponse:
    properties:
      Error:
        example: error message
        type: string
    type: object
  V2.ODataPagedResponse-Models_Product:
    properties:
      '@odata.context':
        type: string
      '@odata.count':
        type: integer
      '@odata.nextLink':
        type: string
      value:
        items:
          $ref: '#/definitions/Models.Product'
        type: array
    type: object
  V2.ODataPagedResponse-Models_User:
    properties:
      '@odata.context':
        type: string
      '@odata.count':
        type: integer
      '@odata.nextLink':
        type: string
      value:
        items:
          $ref: '#/definitions/Models.User'
        type: array
    type: object
  V2.ServiceDocumentEntry:
    properties:
      kind:
        type: string
      name:
        type: string
      url:
        type: string
    type: object
  V2.ServiceDocumentResponse:
    properties:
      '@odata.context':
        type: string
      value:
        items:
          $ref: '#/definitions/V2.ServiceDocumentEntry'
        type: array
    type: object
  gorm.DeletedAt:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API with Gin, GORM, and Swagger — v1 uses custom query params,
    v2 uses OData
  title: Tutorial Go API
  version: "2.0"
paths:
  /api/v1/products:
    get:
      description: Returns a paginated list of products with optional sorting, filtering,
        and search
      parameters:
      - description: 'Number of records to return (default: 10)'
        in: query
        name: top
        type: integer
      - description: 'Number of records to skip (default: 0)'
        in: query
        name: skip
        type: integer
      - description: Field name to sort by (e.g. name, price)
        in: query
        name: sortby
        type: string
      - description: 'Sort direction: asc or desc (default: asc)'
        in: query
        name: order
        type: string
      - description: Search term matched against product name
        in: query
        name: search
        type: string
      - description: Filter by field value (e.g. filter[name]=Laptop)
        in: query
        name: filter
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Repository.PaginationResult-Models_Product'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
      summary: Get all products
      tags:
      - products
    post:
      consumes:
      - application/json
      description: Creates a new product with name and price
      parameters:
      - description: Product data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/V1.CreateProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/Models.Product'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
      summary: Create a product
      tags:
      - products
  /api/v1/products/{id}:
    delete:
      description: Deletes a product by ID (soft delete via GORM)
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/V1.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
      summary: Delete a product
      tags:
      - products
    get:
      description: Returns a single product by ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Models.Product'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
      summary: Get product by ID
      tags:
      - products
    put:
      consumes:
      - application/json
      description: Updates a product by ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated product data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/V1.UpdateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Models.Product'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
      summary: Update a product
      tags:
      - products
  /api/v1/users:
    get:
      description: Returns a paginated list of users with optional sorting, filtering,
        and search
      parameters:
      - description: 'Number of records to return (default: 10)'
        in: query
        name: top
        type: integer
      - description: 'Number of records to skip (default: 0)'
        in: query
        name: skip
        type: integer
      - description: Field name to sort by (e.g. name, email)
        in: query
        name: sortby
        type: string
      - description: 'Sort direction: asc or desc (default: asc)'
        in: query
        name: order
        type: string
      - description: Search term matched against name and email
        in: query
        name: search
        type: string
      - description: Filter by field value (e.g. filter[name]=Herris)
        in: query
        name: filter
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Repository.PaginationResult-Models_User'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
      summary: Get all users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Creates a new user with name and email
      parameters:
      - description: User data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/V1.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/Models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
      summary: Create a user
      tags:
      - users
  /api/v1/users/{id}:
    delete:
      description: Deletes a user by ID (soft delete via GORM)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/V1.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
      summary: Delete a user
      tags:
      - users
    get:
      description: Returns a single user by ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
      summary: Get user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Updates a user by ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated user data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/V1.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/V1.ErrorResponse'
      summary: Update a user
      tags:
      - users
  /api/v2/:
    get:
      description: Lists all available entity sets in the v2 API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/V2.ServiceDocumentResponse'
      summary: OData v4 service document
      tags:
      - odata
  /api/v2/$metadata:
    get:
      description: Returns the EDMX metadata document describing all entity types
        and their properties
      produces:
      - text/xml
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: OData v4 metadata document
      tags:
      - odata
  /api/v2/products:
    get:
      description: Returns a paginated product collection using OData v4 query options
      parameters:
      - description: 'Number of records to return (default: 10)'
        in: query
        name: $top
        type: integer
      - description: 'Number of records to skip (default: 0)'
        in: query
        name: $skip
        type: integer
      - description: Sort field and direction (e.g. name asc, price desc)
        in: query
        name: $orderby
        type: string
      - description: OData filter (e.g. name eq 'Laptop' and price gt 10000, contains(name,'lap'),
          startswith(name,'L'))
        in: query
        name: $filter
        type: string
      - description: Search term matched against product name
        in: query
        name: $search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/V2.ODataPagedResponse-Models_Product'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V2.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/V2.ErrorResponse'
      summary: Get all products (OData v4)
      tags:
      - products
  /api/v2/products/$count:
    get:
      description: Returns the total number of products as plain text
      parameters:
      - description: OData filter expression
        in: query
        name: $filter
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V2.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/V2.ErrorResponse'
      summary: Get product count (OData v4)
      tags:
      - products
  /api/v2/products/{id}:
    get:
      description: Returns a single product with OData v4 context
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V2.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/V2.ErrorResponse'
      summary: Get product by ID (OData v4)
      tags:
      - products
  /api/v2/users:
    get:
      description: Returns a paginated user collection using OData v4 query options
      parameters:
      - description: 'Number of records to return (default: 10)'
        in: query
        name: $top
        type: integer
      - description: 'Number of records to skip (default: 0)'
        in: query
        name: $skip
        type: integer
      - description: Sort field and direction (e.g. name asc, email desc)
        in: query
        name: $orderby
        type: string
      - description: OData filter (e.g. name eq 'Herris', contains(email,'@example.com'))
        in: query
        name: $filter
        type: string
      - description: Search term matched against name and email
        in: query
        name: $search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/V2.ODataPagedResponse-Models_User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V2.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/V2.ErrorResponse'
      summary: Get all users (OData v4)
      tags:
      - users
  /api/v2/users/$count:
    get:
      description: Returns the total number of users as plain text
      parameters:
      - description: OData filter expression
        in: query
        name: $filter
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V2.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/V2.ErrorResponse'
      summary: Get user count (OData v4)
      tags:
      - users
  /api/v2/users/{id}:
    get:
      description: Returns a single user with OData v4 context
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/V2.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/V2.ErrorResponse'
      summary: Get user by ID (OData v4)
      tags:
      - users
swagger: "2.0"
